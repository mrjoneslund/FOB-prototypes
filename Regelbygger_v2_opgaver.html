  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

-weight:600}\n  .namerow{display:flex;align-items:center;gap:6px;margin-top:3px}\n  .rulename{font-family:'Inter',sans-serif;font-size:18px;font-weight:600;color:#272727;cursor:text;border-radius:6px;padding:1px 4px;margin:-1px -4px}\n  .rulename:hover{background:#f3f3f6}\n  .rulename.unset{color:#a4a2ad;font-weight:500;font-style:italic}\n  .name-pencil{width:26px;height:26px;border-radius:6px;color:#9a98a3;display:flex;align-items:center;justify-content:center}\n  .name-pencil:hover{background:#f3f3f6;color:var(--brand)}.name-pencil svg{width:13px;height:13px}\n  .trash{width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:#777;flex-shrink:0;border-radius:8px}\n  .trash:hover{background:#fdecec;color:var(--danger)}.trash svg{width:18px;height:18px}\n\n  /* empty card */\n  .card-empty{border:1.5px dashed #cdccd5;border-radius:12px;padding:40px 24px;display:flex;flex-direction:column;align-items:center;gap:14px}\n  .card-empty .e-ico{width:46px;height:46px;border-radius:50%;background:var(--evt-tint);color:var(--evt);display:flex;align-items:center;justify-content:center}\n  .card-empty .e-ico svg{width:22px;height:22px}\n  .card-empty p{font-size:13.5px;color:var(--text-tertiary);text-align:center;max-width:320px;line-height:1.5}\n  .btn-trigger{height:42px;border-radius:9999px;background:var(--brand);color:#fff;font-weight:600;font-size:14px;letter-spacing:.4px;padding:0 20px;display:inline-flex;align-items:center;gap:7px}\n  .btn-trigger:hover{background:#1f1f4a}.btn-trigger svg{width:16px;height:16px}\n\n  /* ECA rows */\n  .eca{display:flex;flex-direction:column;gap:14px}\n  .eca-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative}\n  .kw-chip{display:inline-flex;align-items:center;gap:8px;height:34px;padding:0 14px 0 11px;border-radius:9px;font-weight:700;font-size:13px;letter-spacing:.6px;flex-shrink:0}\n  .kw-chip .kw-ico{width:18px;height:18px;display:flex;align-items:center;justify-content:center}\n  .kw-chip .kw-ico svg{width:18px;height:18px}\n  .kw-event{background:var(--evt-tint);color:var(--evt)}\n  .kw-cond{background:var(--cond-tint);color:var(--cond)}\n  .kw-act{background:var(--act-tint);color:var(--act)}\n  .conn{font-size:15px;color:#3f3d47;letter-spacing:.2px}\n  .row-x{margin-left:auto;width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:#a4a2ad;border-radius:7px;flex-shrink:0}\n  .row-x:hover{background:#fdecec;color:var(--danger)}.row-x svg{width:15px;height:15px}\n  .skift{border:1px solid #c7c5cf;border-radius:9999px;padding:5px 14px;font-size:12px;color:#55525f;letter-spacing:.3px;flex-shrink:0;font-weight:500;margin-left:auto}\n  .skift:hover{background:#f3f3f6;border-color:var(--brand);color:var(--brand)}\n  .vchip{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:500;letter-spacing:.2px;padding:8px 13px;border-radius:9px;transition:.15s;line-height:1.2}\n  .vchip.empty{border:1.5px dashed #b0aebb;color:#55525f;background:#fbfbfd}\n  .vchip.empty:hover{border-color:var(--brand);color:var(--brand);background:#f7f7fb}\n  .vchip.filled{border:1px solid #c5d8d3;background:var(--teal-tint);color:#1c2b27}\n  .vchip.filled:hover{border-color:var(--brand)}\n  .vchip.filled.danger-val{background:var(--danger-border);border-color:#d94a43;color:#fff}\n  .vchip.missing{border:1.5px dashed var(--danger-border);background:var(--danger-tint);color:var(--danger);font-weight:600}\n  .vchip.missing:hover{background:#ffe1df}\n  .vchip svg{width:12px;height:12px;opacity:.5}\n\n  /* segment dividers between E/C/A groups */\n  .eca-group+.eca-group{margin-top:14px;padding-top:14px;border-top:1px dashed #ececf1}\n\n  /* add-step control (replaces loose pills) */\n  .add-step{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap}\n  .add-step-btn{display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 16px 0 12px;border-radius:9999px;border:1.5px dashed #c2c0cc;background:#fff;color:var(--brand);fon \n  .modal-search input{width:100%;padding:11px 12px 11px 38px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;outline:none}\n  .modal-search input:focus{border-color:var(--brand)}\n  .modal-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-tertiary)}\n  .modal-body{padding:16px 24px;overflow-y:auto;flex:1}\n  .opt{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:.12s}\n  .opt:hover{border-color:var(--brand);background:#f7f7fb}\n  .opt.sel{border-color:var(--brand);background:var(--teal-tint)}\n  .opt .ico-box{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}\n  .opt .ico-box svg{width:18px;height:18px}\n  .ib-event{background:var(--evt-tint);color:var(--evt)}.ib-cond{background:var(--cond-tint);color:var(--cond)}.ib-act{background:var(--act-tint);color:var(--act)}\n  .opt .id{font-size:11px;font-weight:700;color:var(--text-tertiary);background:#f0f0f4;padding:3px 7px;border-radius:5px;flex-shrink:0;min-width:38px;text-align:center}\n  .opt .lbl{flex:1;font-size:14px;font-weight:600}\n  .opt .lbl small{display:block;color:var(--text-tertiary);font-size:12px;font-weight:400;margin-top:2px}\n  .opt .check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center}\n  .opt.sel .check{background:var(--brand);border-color:var(--brand)}\n  .opt .check svg{width:11px;height:11px;color:#fff;display:none}.opt.sel .check svg{display:block}\n  .opt .chev{width:16px;height:16px;color:#c3c1cb;flex-shrink:0}\n  .field-label{font-size:12.5px;font-weight:700;margin-bottom:8px;display:block}\n  .modal-input{width:100%;padding:12px 13px;border:1px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;outline:none}\n  .modal-input:focus{border-color:var(--brand)}.modal-input.err{border-color:var(--danger-border);background:var(--danger-tint)}\n  .helper{font-size:12px;color:var(--text-tertiary);margin-top:7px}.helper.err{color:var(--danger);font-weight:600}\n  .op-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}\n  .op-cell{border:1px solid var(--border);border-radius:10px;padding:14px 6px;text-align:center;cursor:pointer;transition:.12s}\n  .op-cell:hover{border-color:var(--brand);background:#f7f7fb}.op-cell.sel{border-color:var(--brand);background:var(--teal-tint)}\n  .op-cell .sym{font-size:20px;font-weight:700;line-height:1}.op-cell .nm{font-size:11px;color:var(--text-tertiary);margin-top:5px}\n  .modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center}\n  .modal-foot .mbtn{height:42px;border-radius:9999px;padding:0 20px;font-size:14px;font-weight:600;letter-spacing:.4px;transition:.15s}\n  .mbtn-ghost{color:var(--brand)}.mbtn-ghost:hover{background:var(--sky-50)}\n  .mbtn-primary{background:var(--brand);color:#fff}.mbtn-primary:hover{background:#1f1f4a}\n  .modal-foot .right{display:flex;gap:10px;margin-left:auto}\n\n  /* SNACKBAR */\n  .snackwrap{position:fixed;left:0;right:0;bottom:28px;display:flex;justify-content:center;z-index:60;pointer-events:none;padding:0 16px}\n  .snack{pointer-events:auto;min-width:360px;max-width:520px;display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;background:#fff;box-shadow:0 12px 40px rgba(16,16,48,.22),0 0 0 1px rgba(16,16,48,.05);color:var(--text);transform:translateY(180%);opacity:0;transition:.32s cubic-bezier(.2,.9,.3,1)}\n  .snack.show{transform:none;opacity:1}\n  .snack .s-ico{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}\n  .snack.error .s-ico{background:var(--danger-tint);color:var(--danger)}\n  .snack.success .s-ico{background:var(--success-tint);color:var(--success)}\n  .snack .s-ico svg{width:20px;height:20px}\n  .snack .s-txt{flex:1}\n  .snack .s-txt b{display:block;font-size:14px;font-weight:700;margin-bottom:2px;color:var(--text)}\n  .snack .s-txt span{font-size:12.5px;color:var(--text-tertiary);line-height:1.45}\n  .snack .s-act{font-size:13px;font-weight:600;padding:9px 14px;border-radius:9px;border:1px solid var(--border-strong);color:var(--brand);white-space:nowrap;flex-shrink:0;transition:.15s}\n  .snack .s-act:hover{background:var(--sky-50);border-color:var(--brand)}\n  .snack .s-close{color:var(--text-tertiary);opacity:.7;width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:7px}\n  .snack .s-close:hover{opacity:1;background:#f3f3f6}.snack .s-close svg{width:16px;height:16px}\n\n  /* error-details modal list */\n  .err-rule{margin-bottom:16px}\n  .err-rule:last-child{margin-bottom:0}\n  .err-rule .er-head{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;margin-bottom:8px}\n  .err-rule .er-head .er-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);flex-shrink:0}\n  .err-rule .er-head .er-jump{margin-left:auto;font-size:12px;font-weight:600;color:var(--brand);padding:4px 10px;border-radius:7px}\n  .err-rule .er-head .er-jump:hover{background:var(--sky-50)}\n  .err-list{display:flex;flex-direction:column;gap:6px}\n  .err-item{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--text-secondary);padding:9px 12px;background:#fbfbfd;border:1px solid #efeef3;border-radius:9px}\n  .err-item svg{width:14px;height:14px;color:var(--danger);flex-shrink:0}\n  .err-item .ei-kw{font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:5px;flex-shrink:0}\n  .ei-event{background:var(--evt-tint);color:var(--evt)}.ei-cond{background:var(--cond-tint);color:var(--cond)}.ei-act{background:var(--act-tint);color:var(--act)}.ei-gen{background:#eceaf2;color:#55525f}\n  .toast-hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(160%);background:var(--brand);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:55;opacity:0;transition:.25s}\n  .toast-hint.show{transform:translateX(-50%);opacity:1}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- TOP-NAV-SUB -->\n<div class=\"topnav\">\n  <button class=\"icon-circle\" title=\"Tilbage\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><line x1=\"19\" y1=\"12\" x2=\"5\" y2=\"12\"><\u002Fline><polyline points=\"12 19 5 12 12 5\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n  <div class=\"titles\">\n    <div class=\"crumbrow\"><span class=\"crumb\">Modulpakke<\u002Fspan><span class=\"dot\"><\u002Fspan><span id=\"pkgBadge\" class=\"badge-draft\">Kladde<\u002Fspan><\u002Fdiv>\n    <div class=\"titlerow\"><h1 class=\"ff-domine\">Behandling af angst<\u002Fh1>\n      <button class=\"edit-pencil\" title=\"Omdøb pakke\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 20h9\"><\u002Fpath><path d=\"M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <span class=\"saved-label\" id=\"savedLabel\">Gemt i dag 09:34<\u002Fspan>\n  <div class=\"btns\">\n    <button class=\"btn btn-secondary\" onclick=\"onSave()\">Gem<\u002Fbutton>\n    <button class=\"btn btn-primary-disabled\" title=\"Udfyld og gem reglerne først\">Publicér<\u002Fbutton>\n    <button class=\"btn-icon\" title=\"Mere\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><circle cx=\"5\" cy=\"12\" r=\"2\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"2\"><\u002Fcircle><circle cx=\"19\" cy=\"12\" r=\"2\"><\u002Fcircle><\u002Fsvg><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- TAB-NAV -->\n<div class=\"tabnav\">\n  <div class=\"tabitem\">Indhold<\u002Fdiv><div class=\"tabitem\">Opsætning<\u002Fdiv>\n  <div class=\"tabitem\">Valgfrie moduler<\u002Fdiv><div class=\"tabitem\">Tillægsmoduler<\u002Fdiv>\n  <div class=\"tabitem active\">Regler<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- PAGE -->\n<div class=\"page\">\n  <div class=\"page-head\">\n    <h2>Regler<\u002Fh2>\n    <p>Byg automatiske regler efter modellen <b>Når → Hvis → Så<\u002Fb>: en hændelse udløser reglen, en betingelse skal være opfyldt, og en handling udføres. En regel kan først aktiveres, når alle felter er udfyldt.<\u002Fp>\n  <\u002Fdiv>\n  <div id=\"content\"><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"overlay\" id=\"overlay\"><div class=\"modal\" id=\"modal\"><\u002Fdiv><\u002Fdiv>\n<div class=\"snackwrap\"><div class=\"snack\" id=\"snack\"><\u002Fdiv><\u002Fdiv>\n<div class=\"toast-hint\" id=\"hint\"><\u002Fdiv>\n\n<script>\n/* ================= TYPES ================= */\nconst TRIGGER_TYPES=[\n  {id:'borger_inactive',label:'Borger er inaktiv',sub:'Når borgeren ikke har været aktiv',tpl:[{conn:'borgeren er inaktiv'}]},\n  {id:'module_submitted',label:'Modul er indsendt',sub:'Når borgeren indsender et modul',tpl:[{slot:'module'},{conn:'er indsendt'}]},\n];\nconst CONDITION_TYPES=[\n  {id:'days_since_activity',label:'Dage siden seneste aktivitet',sub:'Tid siden borgerens seneste aktivitet',tpl:[{conn:'der er gået mere end'},{slot:'days'},{conn:'siden seneste aktivitet'}]},\n  {id:'calc_compare',label:'Beregning',sub:'Sammenlign en beregnet værdi med et tal',tpl:[{slot:'calc'},{conn:'er'},{slot:'op'},{slot:'value'}]},\n  {id:'answer_is',label:'Svar på spørgsmål',sub:'Et bestemt svar er valgt på et spørgsmål',tpl:[{conn:'svaret på'},{slot:'question'},{conn:'er'},{slot:'answer'}]},\n];\nconst ACTION_TYPES=[\n  {id:'create_task',label:'Dan opgave',sub:'Opret opgave til behandler',tpl:[{conn:'dan opgave med titel'},{slot:'title'},{conn:'og prioritet'},{slot:'prio'}]},\n];\n/* hvilke betingelser der er mulige for hver trigger */\nconst TRIGGER_CONDITIONS={borger_inactive:['days_since_activity'],module_submitted:['calc_compare','answer_is']};\nconst MODULES=[{id:'M1',name:'Intro til forløbet',sub:'Velkomstmodul'},{id:'M2',name:'Registrering af humør',sub:'Dagligt spørgeskema'},{id:'M3',name:'Symptomscore (PHQ-9)',sub:'Validering hver uge'},{id:'M4',name:'Forstå din angst',sub:'Psykoedukation'}];\nconst CALCS=[{id:'C1',name:'symptomscore 1',sub:'Sum af spørgsmål 1–9'},{id:'C2',name:'angstscore',sub:'GAD-7 total'},{id:'C3',name:'humørtrend',sub:'7-dages gennemsnit'}];\nconst TASK_TYPES=[{id:'T1',name:'Selvmordstruet',sub:'Kræver akut opfølgning'},{id:'T2',name:'Opfølgningssamtale',sub:'Booking hos behandler'},{id:'T3',name:'Send besked',sub:'Automatisk notifikation'}];\nconst PRIORITIES=[{id:'low',name:'Lav',color:'#cdeede'},{id:'med',name:'Mellem',color:'#fdf0c4'},{id:'high',name:'Høj',color:'#ff6058'}];\nconst OPERATORS=[{id:'eq',sym:'=',nm:'lig med'},{id:'neq',sym:'≠',nm:'forskellig fra'},{id:'gt',sym:'>',nm:'større end'},{id:'lt',sym:'<',nm:'mindre end'},{id:'gte',sym:'≥',nm:'større/lig'},{id:'lte',sym:'≤',nm:'mindre/lig'}];\nconst TRIGGERS=[{id:'TR1',name:'Trigger 1',sub:'Manuel trigger'},{id:'TR2',name:'Trigger 2',sub:'System-event'},{id:'TR3',name:'Trigger 3',sub:'Tidsplan'}];\nconst ANSWERS=[{id:'A1',name:'Svarmulighed 1'},{id:'A2',name:'Svarmulighed 2'},{id:'A3',name:'Svarmulighed 3'}];\nconst QUESTIONS=[{id:'Q1',name:'Spørgsmål 1',sub:'Hvordan har du det i dag?',type:'radio'},{id:'Q2',name:'Spørgsmål 2',sub:'Har du haft angstanfald?',type:'checkbox'},{id:'Q3',name:'Spørgsmål 3',sub:'Sover du godt?',type:'radio'}];\nconst HANDLINGER=[{id:'H1',name:'Handling 1',sub:'Send påmindelse'},{id:'H2',name:'Handling 2',sub:'Lås modul op'},{id:'H3',name:'Handling 3',sub:'Afslut forløb'}];\n\nlet rules=[];let idc=0;const uid=()=>'r'+(++idc);let showErrors=false;\n\n/* ============ lookups ============ */\nconst find=(coll,id)=>coll.find(x=>x.id===id);\nconst findOp=id=>OPERATORS.find(o=>o.id===id);\nconst findP=id=>PRIORITIES.find(p=>p.id===id);\nconst triggerType=id=>TRIGGER_TYPES.find(t=>t.id===id);\nconst condType=id=>CONDITION_TYPES.find(t=>t.id===id);\nconst actType=id=>ACTION_TYPES.find(t=>t.id===id);\n\nfunction slotInfo(slot,vals){\n  const v=vals[slot];\n  switch(slot){\n    case 'module':{const m=find(MODULES,v);return m?{text:m.id+' – '+m.name}:{empty:1,text:'Modul'};}\n    case 'days':return (v!=null&&v!=='')?{text:v+' dage'}:{empty:1,text:'Antal dage'};\n    case 'trigger':{const t=find(TRIGGERS,v);return t?{text:t.name}:{empty:1,text:'Trigger'};}\n    case 'calc':{const c=find(CALCS,v);return c?{text:c.name}:{empty:1,text:'Beregning'};}\n    case 'op':{const o=findOp(v);return o?{text:o.sym}:{empty:1,text:'Operator'};}\n    case 'value':return (v!=null&&v!=='')?{text:v+''}:{empty:1,text:'Værdi'};\n    case 'answer':{\n      if(Array.isArray(v)){\n        if(!v.length)return {empty:1,text:'Svarmulighed'};\n        const names=v.map(id=>{const a=find(ANSWERS,id);return a?a.name:id;});\n        return {text:names.join(', ')};\n      }\n      const a=find(ANSWERS,v);return a?{text:a.name}:{empty:1,text:'Svarmulighed'};\n    }\n    case 'question':{const q=find(QUESTIONS,v);return q?{text:q.name}:{empty:1,text:'Spørgsmål'};}\n    case 'task':{const t=find(TASK_TYPES,v);return t?{text:t.name}:{empty:1,text:'Type'};}\n    case 'title':return (v&&v.trim())?{text:'\"'+v+'\"'}:{empty:1,text:'Titel'};\n    case 'prio':{const p=findP(v);return p?{text:p.name,danger:p.id==='high'}:{empty:1,text:'Prioritet'};}\n    case 'action':{const h=find(HANDLINGER,v);return h?{text:h.name}:{empty:1,text:'Handling'};}\n  }\n  return {empty:1,text:'…'};\n}\nconst slotModal={module:'pickModule',days:'inputDays',trigger:'pickTrigger',calc:'pickCalc',op:'pickOp',value:'inputValue',answer:'pickAnswer',question:'pickQuestion',task:'pickTask',title:'inputTitle',prio:'pickPrio',action:'pickAction'};\nconst slotLabel={module:'modul',days:'antal dage',trigger:'trigger',calc:'beregning',op:'operator',value:'værdi',answer:'svarmulighed',question:'spørgsmål',task:'opgavetype',title:'titel',prio:'prioritet',action:'handling'};\n\n/* ============ validation ============ */\nfunction slotsOf(kind,typeId){const t=kind==='event'?triggerType(typeId):kind==='cond'?condType(typeId):actType(typeId);return t?t.tpl.filter(x=>x.slot).map(x=>x.slot):[];}\nfunction ruleErrors(r){\n  const e=[];\n  if(!r.name||!r.name.trim())e.push({slot:'name',label:'Regelnavn mangler',kind:'gen'});\n  if(!r.event)e.push({slot:'event',label:'Trigger mangler',kind:'event'});\n  else slotsOf('event',r.event.type).forEach(s=>{if(slotInfo(s,r.event.vals).empty)e.push({slot:'e_'+s,label:cap(slotLabel[s])+' mangler',kind:'event'});});\n  r.conditions.forEach((c,i)=>slotsOf('cond',c.type).forEach(s=>{if(slotInfo(s,c.vals).empty)e.push({slot:'c'+i+s,label:cap(slotLabel[s])+' mangler i betingelse '+(i+1),kind:'cond'});}));\n  if(r.actions.length===0)e.push({slot:'act',label:'Mindst én handling (SÅ) mangler',kind:'act'});\n  r.actions.forEach((a,i)=>slotsOf('act',a.type).forEach(s=>{if(slotInfo(s,a.vals).empty)e.push({slot:'a'+i+s,label:cap(slotLabel[s])+' mangler i handling '+(i+1),kind:'act'});}));\n  return e;\n}\nfunction cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}\nconst isValid=r=>ruleErrors(r).length===0;\n\n/* ============ icons ============ */\nconst I={\n  /* unique ECA icons */\n  event:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polygon points=\"13 2 3 14 12 14 11 22 21 10 12 10 13 2\"/><\u002Fsvg>',      /* lightning = trigger */\n  cond:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polygon points=\"22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3\"/><\u002Fsvg>', /* funnel = condition */\n  act:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 18 15 12 9 6\"/><line x1=\"3\" y1=\"12\" x2=\"15\" y2=\"12\"/><\u002Fsvg>', /* arrow = action */\n  pencil:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 20h9\"/><path d=\"M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z\"/><\u002Fsvg>',\n  trash:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"3 6 5 6 21 6\"/><path d=\"M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2\"/><\u002Fsvg>',\n  x:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"/><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"/><\u002Fsvg>',\n  plus:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"/><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"/><\u002Fsvg>',\n  check:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><polyline points=\"20 6 9 17 4 12\"/><\u002Fsvg>',\n  warn:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z\"/><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"/><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"/><\u002Fsvg>',\n  search:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"8\"/><line x1=\"21\" y1=\"21\" x2=\"16.65\" y2=\"16.65\"/><\u002Fsvg>',\n  chev:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><polyline points=\"9 18 15 12 9 6\"/><\u002Fsvg>',\n  edit:'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7\"/><path d=\"M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z\"/><\u002Fsvg>',\n};\nconst TYPE_KIND={borger_inactive:'event',module_submitted:'event',days_since_activity:'cond',calc_compare:'cond',answer_is:'cond',create_task:'act'};\nconst KIND_ICON={event:I.event,cond:I.cond,act:I.act};\nconst esc=s=>String(s).replace(/[&<>\"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c]));\n\n/* ============ render ============ */\nfunction render(){\n  const c=document.getElementById('content');\n  if(rules.length===0){c.innerHTML=`<button class=\"add-card\" onclick=\"addRule()\">${I.plus} Tilføj regelkort<\u002Fbutton>`;return;}\n  c.innerHTML=`<div class=\"cards\">${rules.map((r,i)=>renderCard(r,i)).join('')}<\u002Fdiv>\n    <button class=\"add-card small\" onclick=\"addRule()\">${I.plus} Tilføj regelkort<\u002Fbutton>`;\n}\n\nfunction renderRow(kindIco,kwClass,kwLabel,segments,vals,argPrefix){\n  let parts=`<span class=\"kw-chip ${kwClass}\"><span class=\"kw-ico\">${kindIco}<\u002Fspan>${kwLabel}<\u002Fspan>`;\n  segments.forEach(seg=>{\n    if(seg.conn)parts+=`<span class=\"conn\">${seg.conn}<\u002Fspan>`;\n    else if(seg.slot){\n      const info=slotInfo(seg.slot,vals);\n      const cls=info.empty?'vchip empty':(info.danger?'vchip filled danger-val':'vchip filled');\n      parts+=`<button class=\"${cls}\" onclick=\"${slotModal[seg.slot]}(${argPrefix},'${seg.slot}')\">${esc(info.text)}<\u002Fbutton>`;\n    }\n  });\n  return parts;\n}\n\nfunction renderCard(r,ri){\n  const hasContent=r.event||r.conditions.length||r.actions.length;\n  let body;\n  if(!hasContent){\n    body=`<div class=\"card-empty\">\n        <div class=\"e-ico\">${I.event}<\u002Fdiv>\n        <p>Kortet er tomt. Start med at vælge, hvornår reglen skal udløses.<\u002Fp>\n        <button class=\"btn-trigger\" onclick=\"pickTriggerType('${r.id}')\">${I.plus} Vælg trigger<\u002Fbutton>\n      <\u002Fdiv>`;\n  }else{\n    let groups='';\n    /* EVENT group */\n    if(r.event){\n      const tt=triggerType(r.event.type);\n      groups+=`<div class=\"eca-group\"><div class=\"eca-row\">\n        ${renderRow(I.event,'kw-event',r.conditions.length?'HVIS':'NÅR',tt.tpl,r.event.vals,`'${r.id}'`)}\n        <button class=\"skift\" onclick=\"confirmChangeTrigger('${r.id}')\">Skift trigger<\u002Fbutton>\n      <\u002Fdiv><\u002Fdiv>`;\n    }\n    /* CONDITION group */\n    if(r.conditions.length){\n      let rows='';\n      r.conditions.forEach((c,ci)=>{\n        rows+=`<div class=\"eca-row\">\n          ${renderRow(I.cond,'kw-cond','OG',condType(c.type).tpl,c.vals,`'${r.id}',${ci}`)}\n          <button class=\"row-x\" title=\"Fjern betingelse\" onclick=\"delCond('${r.id}',${ci})\">${I.x}<\u002Fbutton>\n        <\u002Fdiv>`;\n      });\n      groups+=`<div class=\"eca-group\">${rows}<\u002Fdiv>`;\n    }\n    /* ACTION group */\n    if(r.actions.length){\n      let rows='';\n      r.actions.forEach((a,ai)=>{\n        rows+=`<div class=\"eca-row\">\n          ${renderRow(I.act,'kw-act','SÅ',actType(a.type).tpl,a.vals,`'${r.id}',${ai}`)}\n          <button class=\"row-x\" title=\"Fjern handling\" onclick=\"delAct('${r.id}',${ai})\">${I.x}<\u002Fbutton>\n        <\u002Fdiv>`;\n      });\n      groups+=`<div class=\"eca-group\">${rows}<\u002Fdiv>`;\n    }\n    body=`<div class=\"eca\">${groups}<\u002Fdiv>\n      <div class=\"add-step\">\n        <button class=\"add-step-btn\" onclick=\"pickCondType('${r.id}')\"><span class=\"as-ico ai-cond\">${I.cond}<\u002Fspan>Tilføj OG (betingelse)<\u002Fbutton>\n        <button class=\"add-step-btn\" onclick=\"pickActType('${r.id}')\"><span class=\"as-ico ai-act\">${I.act}<\u002Fspan>Tilføj SÅ (handling)<\u002Fbutton>\n      <\u002Fdiv>`;\n  }\n  const nameHtml=r.name&&r.name.trim()\n    ?`<span class=\"rulename\" id=\"name-${r.id}\" onclick=\"openNameModal('${r.id}')\" title=\"Klik for at omdøbe\">${esc(r.name)}<\u002Fspan>`\n    :`<span class=\"rulename unset\" id=\"name-${r.id}\" onclick=\"openNameModal('${r.id}')\" title=\"Klik for at navngive\">Navngiv regel<\u002Fspan>`;\n  return `<div class=\"card\" id=\"card-${r.id}\">\n    <div class=\"card-head\">\n      <div class=\"tw\"><div class=\"reglbl\">Regel ${ri+1}<\u002Fdiv>\n        <div class=\"namerow\">${nameHtml}\n          <button class=\"name-pencil\" title=\"Omdøb regel\" onclick=\"openNameModal('${r.id}')\">${I.pencil}<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <button class=\"trash\" title=\"Slet regel\" onclick=\"delRule('${r.id}')\">${I.trash}<\u002Fbutton>\n    <\u002Fdiv>\n    ${body}\n  <\u002Fdiv>`;\n}\n\n/* ============ card actions ============ */\nconst getRule=id=>rules.find(r=>r.id===id);\nfunction markUnsaved(){const b=document.getElementById('pkgBadge');b.className='badge-draft';b.textContent='Kladde';document.getElementById('savedLabel').textContent='Ikke gemt';}\nfunction addRule(){rules.push({id:uid(),name:'',active:false,event:null,conditions:[],actions:[]});markUnsaved();render();const el=document.querySelector('#content .card:last-child');if(el){el.scrollIntoView({behavior:'smooth',block:'center'});flash(el);}}\nfunction delRule(id){const r=getRule(id);if((r.event||r.conditions.length||r.actions.length||r.name)&&!confirm('Slet denne regel?'))return;rules=rules.filter(x=>x.id!==id);markUnsaved();render();refreshErrorSnack();}\nfunction delCond(id,ci){getRule(id).conditions.splice(ci,1);markUnsaved();render();refreshErrorSnack();}\nfunction delAct(id,ai){getRule(id).actions.splice(ai,1);markUnsaved();render();refreshErrorSnack();}\nfunction flash(el){el.style.transition='box-shadow .4s';el.style.boxShadow='0 0 0 3px rgba(16,16,48,.22)';setTimeout(()=>el.style.boxShadow='',700);}\n\n/* change trigger -> clear OG + SÅ, go straight to trigger picker (no warning) */\nfunction confirmChangeTrigger(rid){\n  const r=getRule(rid);\n  r.conditions=[];r.actions=[];\n  pickTriggerType(rid);\n}\n\n/* ============ modal infra ============ */\nconst overlay=document.getElementById('overlay'),modalEl=document.getElementById('modal');let ms=null;\nfunction closeModal(){overlay.classList.remove('show');ms=null;}\noverlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});\ndocument.addEventListener('keydown',e=>{if(e.key==='Escape'&&overlay.classList.contains('show'))closeModal();});\nfunction openModal(h){modalEl.innerHTML=h;overlay.classList.add('show');}\nfunction foot(label,fn,back){return `<div class=\"modal-foot\">${back?`<button class=\"mbtn mbtn-ghost\" onclick=\"${back}\">‹ Tilbage<\u002Fbutton>`:''}<div class=\"right\"><button class=\"mbtn mbtn-ghost\" onclick=\"closeModal()\">Annullér<\u002Fbutton><button class=\"mbtn mbtn-primary\" onclick=\"${fn}\">${label}<\u002Fbutton><\u002Fdiv><\u002Fdiv>`;}\n\n/* ----- NAME modal ----- */\nfunction openNameModal(rid){\n  const r=getRule(rid);ms={rid};\n  openModal(`<div class=\"modal-head\"><span class=\"step s-name\">${I.edit} Navngiv<\u002Fspan><h3>Navngiv regel<\u002Fh3><p>Giv reglen et sigende navn, så den er let at genkende på listen.<\u002Fp><\u002Fdiv>\n    <div class=\"modal-body\"><label class=\"field-label\">Regelnavn<\u002Flabel>\n      <input class=\"modal-input\" id=\"nameInput\" maxlength=\"60\" value=\"${esc(r.name)}\" placeholder=\"fx Beregning af score\" oninput=\"this.classList.remove('err')\">\n      <div class=\"helper\" id=\"nameHelp\">Bruges som overskrift på regelkortet.<\u002Fdiv><\u002Fdiv>\n    ${foot('Gem','applyName()')}`);\n  setTimeout(()=>{const i=document.getElementById('nameInput');i.focus();i.select();},50);\n  document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')applyName();});\n}\nfunction applyName(){const inp=document.getElementById('nameInput'),v=inp.value.trim();if(v===''){inp.classList.add('err');const h=document.getElementById('nameHelp');h.className='helper err';h.textContent='Navnet må ikke være tomt.';return;}getRule(ms.rid).name=v;markUnsaved();closeModal();render();refreshErrorSnack();toast('Navn gemt');}\n\n/* ----- TYPE chooser ----- */\nfunction typeChooser(kindClass,stepIco,step,title,desc,types,onPick){\n  const opts=types.map(t=>{const k=TYPE_KIND[t.id];return `<div class=\"opt\" onclick=\"${onPick}('${t.id}')\">\n      <span class=\"ico-box ib-${k}\">${KIND_ICON[k]}<\u002Fspan>\n      <span class=\"lbl\">${t.label}<small>${t.sub}<\u002Fsmall><\u002Fspan>\n      <span class=\"chev\">${I.chev}<\u002Fspan><\u002Fdiv>`;}).join('');\n  openModal(`<div class=\"modal-head\"><span class=\"step ${kindClass}\">${stepIco} ${step}<\u002Fspan><h3>${title}<\u002Fh3><p>${desc}<\u002Fp><\u002Fdiv>\n    <div class=\"modal-body\">${opts}<\u002Fdiv>\n    <div class=\"modal-foot\"><div class=\"right\"><button class=\"mbtn mbtn-ghost\" onclick=\"closeModal()\">Annullér<\u002Fbutton><\u002Fdiv><\u002Fdiv>`);\n}\nfunction pickTriggerType(rid){ms={rid};typeChooser('s-event',I.event,'Når · trigger','Vælg trigger','Hvad skal udløse reglen?',TRIGGER_TYPES,'chooseTrigger');}\nfunction chooseTrigger(t){const r=getRule(ms.rid);r.event={type:t,vals:{}};let auto=false;if(t==='borger_inactive'&&!r.conditions.some(c=>c.type==='days_since_activity')){r.conditions.push({type:'days_since_activity',vals:{}});auto=true;}markUnsaved();closeModal();render();refreshErrorSnack();toast(auto?'Trigger tilføjet — betingelse om antal dage er sat automatisk':'Trigger tilføjet — udfyld felterne');}\nfunction pickCondType(rid){ms={rid};typeChooser('s-cond',I.cond,'Hvis · betingelse','Vælg betingelse','Hvad skal være sandt, før reglen udløses?',availableConditions(getRule(rid)),'chooseCond');}\nfunction chooseCond(t){getRule(ms.rid).conditions.push({type:t,vals:{}});markUnsaved();closeModal();render();refreshErrorSnack();toast('Betingelse tilføjet — udfyld felterne');}\nfunction pickActType(rid){ms={rid};typeChooser('s-act',I.act,'Så · handling','Vælg handling','Hvad skal der ske, når reglen udløses?',ACTION_TYPES,'chooseAct');}\nfunction chooseAct(t){getRule(ms.rid).actions.push({type:t,vals:{}});markUnsaved();closeModal();render();refreshErrorSnack();toast('Handling tilføjet — udfyld felterne');}\n\n/* combined add-step menu (OG vs SÅ) */\nfunction addStepMenu(rid){\n  ms={rid};\n  openModal(`<div class=\"modal-head\"><span class=\"step s-name\">${I.plus} Tilføj<\u002Fspan><h3>Hvad vil du tilføje?<\u002Fh3><p>Vælg om du vil tilføje en betingelse (OG) eller en handling (SÅ).<\u002Fp><\u002Fdiv>\n    <div class=\"modal-body\">\n      <div class=\"opt\" onclick=\"closeModal();pickCondType('${rid}')\">\n        <span class=\"ico-box ib-cond\">${I.cond}<\u002Fspan>\n        <span class=\"lbl\">Betingelse (OG)<small>Noget der også skal være sandt<\u002Fsmall><\u002Fspan><span class=\"chev\">${I.chev}<\u002Fspan><\u002Fdiv>\n      <div class=\"opt\" onclick=\"closeModal();pickActType('${rid}')\">\n        <span class=\"ico-box ib-act\">${I.act}<\u002Fspan>\n        <span class=\"lbl\">Handling (SÅ)<small>Noget der skal udføres<\u002Fsmall><\u002Fspan><span class=\"chev\">${I.chev}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-foot\"><div class=\"right\"><button class=\"mbtn mbtn-ghost\" onclick=\"closeModal()\">Annullér<\u002Fbutton><\u002Fdiv><\u002Fdiv>`);\n}\n\n/* ----- slot fillers ----- */\nfunction target(rid,idx,kind){const r=getRule(rid);if(kind==='event')return r.event.vals;if(kind==='cond')return r.conditions[idx].vals;return r.actions[idx].vals;}\nfunction listPicker(coll,o){\n  ms.sel=o.cur;ms._coll=coll;\n  const items=coll.map(x=>`<div class=\"opt ${o.cur===x.id?'sel':''}\" data-id=\"${x.id}\" onclick=\"ms.sel='${x.id}';selOpt('${x.id}')\">\n      ${o.ids?`<span class=\"id\">${x.id}<\u002Fspan>`:''}\n      <span class=\"lbl\">${x.name}${x.sub?`<small>${x.sub}<\u002Fsmall>`:''}<\u002Fspan>\n      <span class=\"check\">${I.check}<\u002Fspan><\u002Fdiv>`).join('');\n  openModal(`<div class=\"modal-head\"><span class=\"step ${o.kindClass}\">${o.stepIco} ${o.step}<\u002Fspan><h3>${o.title}<\u002Fh3><p>${o.desc}<\u002Fp><\u002Fdiv>\n    ${coll.length>4?`<div class=\"modal-search\">${I.search}<input placeholder=\"${o.ph}\" oninput=\"filterOpts(this.value)\">`+`<\u002Fdiv>`:''}\n    <div class=\"modal-body\" id=\"optBody\">${items}<\u002Fdiv>${foot('Anvend',o.apply,o.back)}`);\n}\nfunction selOpt(id){document.querySelectorAll('#optBody .opt').forEach(el=>el.classList.toggle('sel',el.dataset.id===id));}\nfunction filterOpts(q){q=q.toLowerCase();document.querySelectorAll('#optBody .opt').forEach(el=>el.style.display=el.textContent.toLowerCase().includes(q)?'':'none');}\n\nfunction pickModule(rid,a,b){let idx,slot;if(b===undefined){slot=a;}else{idx=a;slot=b;}const kind=idx===undefined?'event':'cond';ms={rid,idx,kind,slot};listPicker(MODULES,{kindClass:'s-event',stepIco:I.event,step:'Når · trigger',title:'Vælg Modul',desc:'Reglen aktiveres, når borgeren indsender det valgte modul.',ids:true,ph:'Søg modul…',cur:target(rid,idx,kind)[slot],apply:'applySel()'});}\nfunction pickTrigger(rid,a,b){let idx,slot;if(b===undefined){slot=a;}else{idx=a;slot=b;}ms={rid,idx,kind:'event',slot};listPicker(TRIGGERS,{kindClass:'s-event',stepIco:I.event,step:'Når · trigger',title:'Vælg trigger',desc:'Vælg den trigger der udløser reglen.',ids:false,ph:'Søg trigger…',cur:target(rid,idx,'event')[slot],apply:'applySel()'});}\nfunction pickCalc(rid,idx,slot){ms={rid,idx,kind:'cond',slot};listPicker(CALCS,{kindClass:'s-cond',stepIco:I.cond,step:'Hvis · betingelse',title:'Vælg beregning',desc:'Vælg hvilken beregnet værdi betingelsen skal måles på.',ids:true,ph:'Søg beregning…',cur:target(rid,idx,'cond')[slot],apply:'applySel()'});}\n/* betingelser begrænses af den valgte trigger */\nfunction availableConditions(r){const allow=r&&r.event&&TRIGGER_CONDITIONS[r.event.type];return allow?CONDITION_TYPES.filter(c=>allow.includes(c.id)):CONDITION_TYPES;}\nfunction pickAnswer(rid,idx,slot){const vals=target(rid,idx,'cond');const q=find(QUESTIONS,vals.question);if(!q){hint('Vælg et spørgsmål først');return;}const multi=q.type==='checkbox';const cur=vals[slot];let sel;if(multi){sel=Array.isArray(cur)?cur.slice():(cur?[cur]:[]);}else{sel=Array.isArray(cur)?(cur[0]||null):(cur||null);}ms={rid,idx,kind:'cond',slot,multi,sel};drawAnswerPicker();}\nfunction drawAnswerPicker(){const multi=ms.multi;const items=ANSWERS.map(x=>{const on=multi?ms.sel.includes(x.id):ms.sel===x.id;const radius=multi?'6px':'50%';const click=multi?`toggleAnswer('${x.id}')`:`ms.sel='${x.id}';drawAnswerPicker()`;return `<div class=\"opt ${on?'sel':''}\" data-id=\"${x.id}\" onclick=\"${click}\"><span class=\"lbl\">${x.name}<\u002Fspan><span class=\"check\" style=\"border-radius:${radius}\">${I.check}<\u002Fspan><\u002Fdiv>`;}).join('');const title=multi?'Vælg svarmulighed(er)':'Vælg svarmulighed';const desc=multi?'Spørgsmålet er et flervalg – vælg ét eller flere svar. Betingelsen er opfyldt, når et af de valgte svar er givet.':'Spørgsmålet har ét svar – vælg det svar betingelsen gælder for.';openModal(`<div class=\"modal-head\"><span class=\"step s-cond\">${I.cond} Hvis · betingelse<\u002Fspan><h3>${title}<\u002Fh3><p>${desc}<\u002Fp><\u002Fdiv><div class=\"modal-body\" id=\"optBody\">${items}<\u002Fdiv>${foot('Anvend',multi?'applyAnswerMulti()':'applyAnswerSingle()')}`);}\nfunction toggleAnswer(id){const i=ms.sel.indexOf(id);if(i>=0)ms.sel.splice(i,1);else ms.sel.push(id);drawAnswerPicker();}\nfunction applyAnswerMulti(){if(!ms.sel.length){hint('Vælg mindst én svarmulighed');return;}target(ms.rid,ms.idx,'cond')[ms.slot]=ms.sel.slice();markUnsaved();closeModal();render();refreshErrorSnack();toast(ms.sel.length>1?ms.sel.length+' svar valgt':'Svar valgt');}\nfunction applyAnswerSingle(){if(!ms.sel){hint('Vælg en svarmulighed');return;}target(ms.rid,ms.idx,'cond')[ms.slot]=ms.sel;markUnsaved();closeModal();render();refreshErrorSnack();toast('Svar valgt');}\nfunction pickQuestion(rid,idx,slot){ms={rid,idx,kind:'cond',slot,sel:target(rid,idx,'cond')[slot]};drawQuestionPicker();}\nfunction drawQuestionPicker(){const items=QUESTIONS.map(q=>{const sel=ms.sel===q.id;const multi=q.type==='checkbox';const badge=`<span style=\"display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;background:#f0f0f4;color:#55525f;flex-shrink:0\"><span style=\"width:12px;height:12px;border:2px solid currentColor;border-radius:${multi?'3px':'50%'};flex-shrink:0\"><\u002Fspan>${multi?'Flere svar':'Ét svar'}<\u002Fspan>`;return `<div class=\"opt ${sel?'sel':''}\" data-id=\"${q.id}\" onclick=\"ms.sel='${q.id}';drawQuestionPicker()\"><span class=\"lbl\">${q.name}<small>${q.sub}<\u002Fsmall><\u002Fspan>${badge}<span class=\"check\">${I.check}<\u002Fspan><\u002Fdiv>`;}).join('');openModal(`<div class=\"modal-head\"><span class=\"step s-cond\">${I.cond} Hvis · betingelse<\u002Fspan><h3>Vælg spørgsmål<\u002Fh3><p>Mærket viser om spørgsmålet har ét svar (radio) eller flere svar (checkbokse) – det afspejles i svarmulighederne.<\u002Fp><\u002Fdiv><div class=\"modal-body\" id=\"optBody\">${items}<\u002Fdiv>${foot('Anvend','applyQuestion()')}`);}\nfunction applyQuestion(){if(!ms.sel){hint('Vælg et spørgsmål');return;}const vals=target(ms.rid,ms.idx,'cond');if(vals[ms.slot]!==ms.sel){vals[ms.slot]=ms.sel;delete vals.answer;}markUnsaved();closeModal();render();refreshErrorSnack();toast('Spørgsmål valgt');}\nfunction pickTask(rid,idx,slot){ms={rid,idx,kind:'act',slot};listPicker(TASK_TYPES,{kindClass:'s-act',stepIco:I.act,step:'Så · handling',title:'Vælg opgavetype',desc:'Hvilken type opgave skal oprettes?',ids:false,ph:'Søg…',cur:target(rid,idx,'act')[slot],apply:'applySel()'});}\nfunction pickAction(rid,idx,slot){ms={rid,idx,kind:'act',slot};listPicker(HANDLINGER,{kindClass:'s-act',stepIco:I.act,step:'Så · handling',title:'Vælg handling',desc:'Vælg den handling der skal udføres.',ids:false,ph:'Søg…',cur:target(rid,idx,'act')[slot],apply:'applySel()'});}\nfunction applySel(){if(!ms.sel){hint('Vælg en mulighed');return;}target(ms.rid,ms.idx,ms.kind)[ms.slot]=ms.sel;markUnsaved();closeModal();render();refreshErrorSnack();toast('Valg gemt');}\n\nfunction pickOp(rid,idx,slot){ms={rid,idx,kind:'cond',slot,sel:target(rid,idx,'cond')[slot]};drawOp();}\nfunction drawOp(){const cells=OPERATORS.map(o=>`<div class=\"op-cell ${ms.sel===o.id?'sel':''}\" onclick=\"ms.sel='${o.id}';drawOp()\"><div class=\"sym\">${o.sym}<\u002Fdiv><div class=\"nm\">${o.nm}<\u002Fdiv><\u002Fdiv>`).join('');openModal(`<div class=\"modal-head\"><span class=\"step s-cond\">${I.cond} Hvis · betingelse<\u002Fspan><h3>Vælg operator<\u002Fh3><p>Hvordan skal værdien sammenlignes?<\u002Fp><\u002Fdiv><div class=\"modal-body\"><div class=\"op-grid\">${cells}<\u002Fdiv><\u002Fdiv>${foot('Anvend','applyOp()')}`);}\nfunction applyOp(){if(!ms.sel){hint('Vælg en operator');return;}target(ms.rid,ms.idx,'cond')[ms.slot]=ms.sel;markUnsaved();closeModal();render();refreshErrorSnack();toast('Operator valgt');}\n\nfunction inputDays(rid,a,b){let idx,slot,kind;if(b===undefined){slot=a;kind='event';}else{idx=a;slot=b;kind='cond';}ms={rid,idx,kind,slot};const cur=target(rid,idx,kind)[slot]||'';const stepCls=kind==='cond'?'s-cond':'s-event';const stepIco=kind==='cond'?I.cond:I.event;const stepTxt=kind==='cond'?'Hvis · betingelse':'Når · trigger';const desc=kind==='cond'?'Hvor mange dage skal der være gået siden borgerens seneste aktivitet?':'Hvor mange dage efter forløbsstart skal reglen udløses?';openModal(`<div class=\"modal-head\"><span class=\"step ${stepCls}\">${stepIco} ${stepTxt}<\u002Fspan><h3>Vælg antal dage<\u002Fh3><p>${desc}<\u002Fp><\u002Fdiv><div class=\"modal-body\"><label class=\"field-label\">Antal dage<\u002Flabel><input class=\"modal-input\" id=\"numInput\" type=\"number\" inputmode=\"numeric\" value=\"${esc(cur)}\" placeholder=\"fx 7\" oninput=\"this.classList.remove('err')\"><div class=\"helper\" id=\"numHelp\">Heltal fra 1 og op.<\u002Fdiv><\u002Fdiv>${foot('Anvend','applyNum()')}`);setTimeout(()=>document.getElementById('numInput').focus(),50);document.getElementById('numInput').addEventListener('keydown',e=>{if(e.key==='Enter')applyNum();});}\nfunction inputValue(rid,idx,slot){ms={rid,idx,kind:'cond',slot};const cur=target(rid,idx,'cond')[slot]||'';openModal(`<div class=\"modal-head\"><span class=\"step s-cond\">${I.cond} Hvis · betingelse<\u002Fspan><h3>Indtast værdi<\u002Fh3><p>Angiv den værdi, beregningen skal sammenlignes med.<\u002Fp><\u002Fdiv><div class=\"modal-body\"><label class=\"field-label\">Værdi<\u002Flabel><input class=\"modal-input\" id=\"numInput\" type=\"number\" inputmode=\"numeric\" value=\"${esc(cur)}\" placeholder=\"fx 25\" oninput=\"this.classList.remove('err')\"><div class=\"helper\" id=\"numHelp\">Numerisk værdi mellem 0 og 100.<\u002Fdiv><\u002Fdiv>${foot('Anvend','applyNum()')}`);setTimeout(()=>document.getElementById('numInput').focus(),50);document.getElementById('numInput').addEventListener('keydown',e=>{if(e.key==='Enter')applyNum();});}\nfunction applyNum(){const inp=document.getElementById('numInput'),v=inp.value.trim();if(v===''){inp.classList.add('err');const h=document.getElementById('numHelp');h.className='helper err';h.textContent='Feltet må ikke være tomt.';return;}target(ms.rid,ms.idx,ms.kind)[ms.slot]=v;markUnsaved();closeModal();render();refreshErrorSnack();toast('Værdi gemt');}\n\nfunction inputTitle(rid,idx,slot){ms={rid,idx,kind:'act',slot};const cur=target(rid,idx,'act')[slot]||'';openModal(`<div class=\"modal-head\"><span class=\"step s-act\">${I.act} Så · handling<\u002Fspan><h3>Skriv opgave titel<\u002Fh3><p>Den tekst behandleren ser på opgaven.<\u002Fp><\u002Fdiv><div class=\"modal-body\"><label class=\"field-label\">Titel<\u002Flabel><input class=\"modal-input\" id=\"titleInput\" maxlength=\"40\" value=\"${esc(cur)}\" placeholder=\"fx Følg op akut\" oninput=\"document.getElementById('cc').textContent=this.value.length+'/40';this.classList.remove('err')\"><div class=\"helper\"><span id=\"cc\">${cur.length}/40<\u002Fspan> tegn.<\u002Fdiv><\u002Fdiv>${foot('Anvend','applyTitle()')}`);setTimeout(()=>document.getElementById('titleInput').focus(),50);document.getElementById('titleInput').addEventListener('keydown',e=>{if(e.key==='Enter')applyTitle();});}\nfunction applyTitle(){const inp=document.getElementById('titleInput'),v=inp.value.trim();if(v===''){inp.classList.add('err');return;}target(ms.rid,ms.idx,'act')[ms.slot]=v;markUnsaved();closeModal();render();refreshErrorSnack();toast('Titel gemt');}\n\nfunction pickPrio(rid,idx,slot){ms={rid,idx,kind:'act',slot,sel:target(rid,idx,'act')[slot]};drawPrio();}\nfunction drawPrio(){const opts=PRIORITIES.map(p=>`<div class=\"opt ${ms.sel===p.id?'sel':''}\" onclick=\"ms.sel='${p.id}';drawPrio()\"><span style=\"width:16px;height:16px;border-radius:5px;background:${p.color};flex-shrink:0\"><\u002Fspan><span class=\"lbl\">${p.name}<\u002Fspan><span class=\"check\">${I.check}<\u002Fspan><\u002Fdiv>`).join('');openModal(`<div class=\"modal-head\"><span class=\"step s-act\">${I.act} Så · handling<\u002Fspan><h3>Vælg prioritet<\u002Fh3><p>Bestemmer hvor opgaven placeres i behandlerens kø.<\u002Fp><\u002Fdiv><div class=\"modal-body\">${opts}<\u002Fdiv>${foot('Anvend','applyPrio()')}`);}\nfunction applyPrio(){if(!ms.sel){hint('Vælg en prioritet');return;}target(ms.rid,ms.idx,'act')[ms.slot]=ms.sel;markUnsaved();closeModal();render();refreshErrorSnack();toast('Prioritet valgt');}\n\n/* ============ save + snackbar ============ */\nconst snack=document.getElementById('snack');let snackTimer=null;let errorSnackActive=false;\n/* called after any edit: if the error snackbar is up, refresh it live (or dismiss when clean) */\nfunction refreshErrorSnack(){\n  if(!errorSnackActive)return;\n  const bad=rules.filter(r=>!isValid(r));\n  if(bad.length===0){\n    errorSnackActive=false;showErrors=false;\n    render();\n    const b=document.getElementById('pkgBadge');b.className='badge-active';b.textContent='Klar';\n    showSuccessSnack(true);\n  }else{\n    showErrorSnack();\n  }\n}\nfunction totalErrorCount(){return rules.reduce((n,r)=>n+ruleErrors(r).length,0);}\nfunction badRuleCount(){return rules.filter(r=>!isValid(r)).length;}\n\nfunction showErrorSnack(){\n  const rc=badRuleCount();const fc=totalErrorCount();\n  clearTimeout(snackTimer);snack.className='snack error';\n  snack.innerHTML=`<div class=\"s-ico\">${I.warn}<\u002Fdiv>\n    <div class=\"s-txt\"><b>${rc} regel${rc>1?'ler':''} mangler felter<\u002Fb>\n      <span>${fc} felt${fc>1?'er':''} skal udfyldes, før du kan gemme.<\u002Fspan><\u002Fdiv>\n    <button class=\"s-act\" onclick=\"openErrorDetails()\">Se detaljer<\u002Fbutton>\n    <button class=\"s-close\" onclick=\"hideSnack()\">${I.x}<\u002Fbutton>`;\n  requestAnimationFrame(()=>snack.classList.add('show'));\n}\nfunction openErrorDetails(){\n  const KW={event:{cls:'ei-event',txt:'NÅR'},cond:{cls:'ei-cond',txt:'OG'},act:{cls:'ei-act',txt:'SÅ'},gen:{cls:'ei-gen',txt:'REGEL'}};\n  let blocks='';\n  rules.forEach((r,i)=>{\n    const errs=ruleErrors(r);if(!errs.length)return;\n    const name=r.name&&r.name.trim()?esc(r.name):('Regel '+(i+1));\n    const items=errs.map(e=>{const k=KW[e.kind]||KW.gen;return `<div class=\"err-item\"><span class=\"ei-kw ${k.cls}\">${k.txt}<\u002Fspan><span>${esc(e.label)}<\u002Fspan><\u002Fdiv>`;}).join('');\n    blocks+=`<div class=\"err-rule\">\n        <div class=\"er-head\"><span class=\"er-dot\"><\u002Fspan>${name}\n          <button class=\"er-jump\" onclick=\"closeModal();jumpTo('${r.id}')\">Gå til regel ›<\u002Fbutton><\u002Fdiv>\n        <div class=\"err-list\">${items}<\u002Fdiv><\u002Fdiv>`;\n  });\n  openModal(`<div class=\"modal-head\"><span class=\"step s-name\" style=\"background:var(--danger-tint);color:var(--danger)\">${I.warn} Mangler<\u002Fspan><h3>Felter der mangler<\u002Fh3><p>Udfyld felterne herunder for at kunne gemme reglerne.<\u002Fp><\u002Fdiv>\n    <div class=\"modal-body\">${blocks}<\u002Fdiv>\n    <div class=\"modal-foot\"><div class=\"right\"><button class=\"mbtn mbtn-primary\" onclick=\"closeModal()\">Luk<\u002Fbutton><\u002Fdiv><\u002Fdiv>`);\n}\nfunction showSuccessSnack(liveFixed){\n  clearTimeout(snackTimer);snack.className='snack success';\n  const title=liveFixed?'Alle felter er udfyldt':'Reglerne er gemt';\n  const msg=liveFixed?`Alle ${rules.length} regler er klar. Tryk Gem for at gemme.`:`${rules.length} regel${rules.length>1?'ler':''} blev gemt uden fejl.`;\n  snack.innerHTML=`<div class=\"s-ico\">${I.check}<\u002Fdiv><div class=\"s-txt\"><b>${title}<\u002Fb><span>${msg}<\u002Fspan><\u002Fdiv><button class=\"s-close\" onclick=\"hideSnack()\">${I.x}<\u002Fbutton>`;\n  requestAnimationFrame(()=>snack.classList.add('show'));snackTimer=setTimeout(hideSnack,4200);\n}\nfunction hideSnack(){snack.classList.remove('show');}\nfunction jumpTo(rid){const el=document.getElementById('card-'+rid);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});flash(el);}hideSnack();}\n\nfunction onSave(){\n  if(rules.length===0){clearTimeout(snackTimer);snack.className='snack error';snack.innerHTML=`<div class=\"s-ico\">${I.warn}<\u002Fdiv><div class=\"s-txt\"><b>Ingen regler at gemme<\u002Fb><span>Tilføj mindst ét regelkort først.<\u002Fspan><\u002Fdiv><button class=\"s-close\" onclick=\"hideSnack()\">${I.x}<\u002Fbutton>`;requestAnimationFrame(()=>snack.classList.add('show'));return;}\n  const bad=rules.filter(r=>!isValid(r));\n  if(bad.length){showErrors=true;errorSnackActive=true;render();showErrorSnack();}\n  else{showErrors=false;errorSnackActive=false;render();const b=document.getElementById('pkgBadge');b.className='badge-active';b.textContent='Gemt';const now=new Date();document.getElementById('savedLabel').textContent='Gemt i dag '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');showSuccessSnack();}\n}\nconst hintEl=document.getElementById('hint');let hintTimer=null;\nfunction hint(m){clearTimeout(hintTimer);hintEl.textContent=m;hintEl.classList.add('show');hintTimer=setTimeout(()=>hintEl.classList.remove('show'),2200);}\nfunction toast(m){hint(m);}\n\nrender();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
